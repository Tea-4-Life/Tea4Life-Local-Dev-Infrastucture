services:
  #  =================================================================
  #  Kafka
  #  =================================================================
  kafka:
    image: apache/kafka:latest
    container_name: tea4life-kafka-container
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "9092:9092"
    environment:
      # [Tổng quan]
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # [Listener]
      # INTERNAL: container trong Docker kết nối qua kafka:19092
      # EXTERNAL: app trên máy host kết nối qua localhost:9092
      # CONTROLLER: cổng quản lý metadata
      KAFKA_LISTENERS: 'INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:19092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # [Controller/Quorum]
      # Local 1 node: id=1, địa chỉ kafka:9093.
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      # [Replication/Partition]
      # Local để 1 để khởi động nhanh, ít tốn tài nguyên.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - tea4life-network

  #  =================================================================
  #  Keycloak
  #  =================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: tea4life-keycloak-container
    deploy:
      resources:
        limits:
          memory: 750M
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      "/opt/keycloak/bin/kc.sh build --health-enabled=true"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json
      - ./providers:/opt/keycloak/providers
      - ./themes:/opt/keycloak/themes:z
    healthcheck:
      test: [ "CMD-SHELL", "curl --head -fsS http://localhost:9001/health/ready | echo $?" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    #    depends_on:
    #      kafka:
    #        condition: service_healthy
    ports:
      - "9000:8080"
      - "9001:9001"
    environment:
      # Database
      KC_DB: mariadb
      KC_DB_URL: jdbc:mariadb://${KEYCLOAK_DB_MARIADB_HOST}:${KEYCLOAK_DB_MARIADB_PORT}/${KEYCLOAK_DB_MARIADB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_MARIADB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_MARIADB_PASSWORD}
      # Keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # SPI Config
      KAFKA_BOOTSTRAP_SERVER: ${KAFKA_BOOTSTRAP_SERVER}
      KEYCLOAK_KAFKA_TOPIC: ${USER_REGISTRATION_TOPIC}
      # Heath & Metrics
      KC_METRICS_ENABLED: "true"
      KC_HTTP_HEALTH_PORT: "9001"
      # Network
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      JAVA_OPTS_APPEND: -Xms256m -Xmx512m
    networks:
      - tea4life-network

volumes:
  kafka_data:

networks:
  tea4life-network:
    driver: bridge
