name: Build Keycloak Custom Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "keycloak-kafka-listener/**"
      - "providers/**"
      - "themes/**"
      - "realm-export.json"
      - "Dockerfile.keycloak-custom"
      - ".github/workflows/build-keycloak-image.yml"

env:
  KEYCLOAK_VERSION: "26.5.2"
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tea4life-keycloak

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build Keycloak Kafka Listener
        working-directory: keycloak-kafka-listener
        run: mvn -B -DskipTests clean package

      - name: Prepare Docker build context
        run: |
          set -euo pipefail
          mkdir -p .build/keycloak-image/providers
          mkdir -p .build/keycloak-image/themes

          cp providers/keycloak-kafka-listener.jar .build/keycloak-image/providers/keycloak-kafka-listener.jar
          cp -r themes/. .build/keycloak-image/themes/
          cp realm-export.json .build/keycloak-image/realm-export.json
          cp Dockerfile.keycloak-custom .build/keycloak-image/Dockerfile

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .build/keycloak-image
          file: .build/keycloak-image/Dockerfile
          push: true
          build-args: |
            KEYCLOAK_VERSION=${{ env.KEYCLOAK_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

